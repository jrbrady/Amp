<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Particle Flow Recorder</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
#status { margin-bottom: 16px; font-size: 14px; color: #555; height: 20px; }
#progress-bar-wrap { width: 1280px; height: 4px; background: #eee; border-radius: 2px; margin-bottom: 12px; }
#progress-bar { height: 4px; background: #D85A30; border-radius: 2px; width: 0%; transition: width 0.1s; }
canvas { display: block; border: 1px solid #eee; }
#btn { margin-top: 16px; padding: 10px 28px; background: #D85A30; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
#btn:disabled { background: #ccc; cursor: default; }
#note { margin-top: 10px; font-size: 12px; color: #999; max-width: 600px; text-align: center; line-height: 1.5; }
</style>
</head>
<body>

<div id="status">Click Record to capture the animation</div>
<div id="progress-bar-wrap"><div id="progress-bar"></div></div>
<canvas id="c" width="1280" height="720"></canvas>
<button id="btn" onclick="startRecording()">⏺ Record (4 sec loop)</button>
<div id="note">Opens in Chrome. Click Record — wait 4 seconds — WebM file downloads automatically. Transparent alpha background. Insert into PowerPoint as a video and set to Loop.</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1280, H = 720;

const STREAM_CY = H * 0.50;
const STREAM_H  = H * 0.52;
const X_START   = 60;
const X_END     = 1060;

const STREAMS = [
  { yOff: -0.42 },
  { yOff: -0.20 },
  { yOff:  0.00 },
  { yOff: +0.20 },
  { yOff: +0.42 },
];

function lerpColor(xp) {
  if (xp < 0.45) return [216, 90, 48];
  if (xp < 0.60) {
    const t = (xp - 0.45) / 0.15;
    return [Math.round(216+(166-216)*t), Math.round(90+(125-90)*t), Math.round(48+(212-48)*t)];
  }
  if (xp < 0.68) return [166, 125, 212];
  if (xp < 0.80) {
    const t = (xp - 0.68) / 0.12;
    return [Math.round(166+(74-166)*t), Math.round(125+(163-125)*t), Math.round(212+(232-212)*t)];
  }
  return [74, 163, 232];
}

function getY(stream, xp, wa, wf, wp) {
  let laneBlend, wobbleBlend;
  if (xp < 0.20) {
    laneBlend = 1.0; wobbleBlend = 1.0;
  } else if (xp < 0.80) {
    const t = (xp - 0.20) / 0.60;
    laneBlend = 1.0 - t * 0.65; wobbleBlend = 1.0;
  } else if (xp < 0.95) {
    const t = (xp - 0.80) / 0.15;
    laneBlend = 0.35 * (1.0 - t); wobbleBlend = 1.0 - t;
  } else {
    laneBlend = 0.0; wobbleBlend = 0.0;
  }
  return STREAM_CY
    + stream.yOff * STREAM_H * 0.5 * laneBlend
    + wa * Math.sin(xp * wf * Math.PI + wp) * wobbleBlend;
}

function survivalOpacity(p, xp) {
  if (xp < 0.20 || p.fate === 1.0) return 1.0;
  if (xp < p.fate) return 1.0;
  if (xp < p.fate + 0.10) return 1.0 - (xp - p.fate) / 0.10;
  return 0.0;
}

// Seeded RNG
let seed = 42;
function rng() { seed = Math.sin(seed) * 10000; return seed - Math.floor(seed); }

const parts = [];
for (let i = 0; i < 130; i++) {
  const stream = STREAMS[Math.floor(rng() * STREAMS.length)];
  const outer = Math.abs(stream.yOff);
  const surviveChance = 0.55 - outer * 0.55;
  const fate = rng() < surviveChance ? 1.0 : 0.20 + rng() * (0.60 * (1 - outer * 0.6));
  parts.push({
    stream, fate,
    dur: 0.60 + rng() * 0.32,
    off: rng(),
    size: 3 + rng() * 5.5,
    op:  0.65 + rng() * 0.35,
    wa:  2.0  + rng() * 6.0,
    wf:  0.6  + rng() * 1.4,
    wp:  rng() * Math.PI * 2,
  });
}

const LOOP_DURATION = 4000; // ms

function drawFrame(t) {
  // t = 0 to 1
  ctx.clearRect(0, 0, W, H);
  // Transparent background — do NOT fill white

  for (const p of parts) {
    const tl = (t - p.off + 1) % 1;
    const xp = tl / p.dur;
    if (xp > 1) continue;

    const x = X_START + xp * (X_END - X_START);
    const y = getY(p.stream, xp, p.wa, p.wf, p.wp);

    let fade = p.op;
    if (xp < 0.05) fade *= xp / 0.05;
    else if (xp > 0.90) fade *= (1 - xp) / 0.10;
    fade *= survivalOpacity(p, xp);
    if (fade < 0.02) continue;

    const [r, g, b] = lerpColor(xp);

    // Subtle glow
    const glow = p.size * 1.8;
    const grd = ctx.createRadialGradient(x, y, 0, x, y, glow);
    grd.addColorStop(0, `rgba(${r},${g},${b},${(fade * 0.28).toFixed(2)})`);
    grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.beginPath(); ctx.arc(x, y, glow, 0, Math.PI * 2);
    ctx.fillStyle = grd; ctx.fill();

    // Core
    ctx.beginPath(); ctx.arc(x, y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${fade.toFixed(2)})`; ctx.fill();
  }
}

// Live preview loop
let previewId;
function previewLoop(ts) {
  const t = (ts % LOOP_DURATION) / LOOP_DURATION;
  drawFrame(t);
  previewId = requestAnimationFrame(previewLoop);
}
previewId = requestAnimationFrame(previewLoop);

// Recording
async function startRecording() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  const bar = document.getElementById('progress-bar');

  btn.disabled = true;
  cancelAnimationFrame(previewId);

  // Check support
  if (!window.MediaRecorder || !canvas.captureStream) {
    status.textContent = '❌ Your browser does not support canvas recording. Use Chrome.';
    btn.disabled = false;
    return;
  }

  // Try VP9 with alpha (WebM)
  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
    ? 'video/webm;codecs=vp9'
    : 'video/webm';

  const stream = canvas.captureStream(30); // 30fps capture
  const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 12_000_000 });
  const chunks = [];

  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: mimeType });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'particle_flow.webm'; a.click();
    URL.revokeObjectURL(url);
    status.textContent = '✅ Downloaded! Insert into PowerPoint as a video.';
    btn.disabled = false;
    btn.textContent = '⏺ Record again';
    previewId = requestAnimationFrame(previewLoop);
  };

  recorder.start();
  status.textContent = '⏺ Recording…';

  const FPS = 30;
  const TOTAL_FRAMES = Math.ceil((LOOP_DURATION / 1000) * FPS);
  let frame = 0;

  function captureFrame() {
    if (frame >= TOTAL_FRAMES) {
      recorder.stop();
      return;
    }
    const t = (frame / TOTAL_FRAMES);
    drawFrame(t);
    bar.style.width = Math.round((frame / TOTAL_FRAMES) * 100) + '%';
    status.textContent = `⏺ Recording… ${Math.round((frame / TOTAL_FRAMES) * 100)}%`;
    frame++;
    setTimeout(captureFrame, 1000 / FPS);
  }
  captureFrame();
}
</script>
</body>
</html>
